name: Pre-Event Alerts

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Send pre-event alerts
        env:
          PROVISION_WEBHOOK_SECRET: ${{ secrets.PROVISION_WEBHOOK_SECRET }}
        run: |
          curl -s -X POST https://www.signalrelayhub.io/api/telegram/pre-event-alert \
            -H "Content-Type: application/json" \
            -H "x-provision-secret: $PROVISION_WEBHOOK_SECRET"
