name: Post-Event Debrief

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  debrief:
    runs-on: ubuntu-latest
    steps:
      - name: Send post-event debrief
        env:
          PROVISION_WEBHOOK_SECRET: ${{ secrets.PROVISION_WEBHOOK_SECRET }}
        run: |
          curl -s -X POST https://www.signalrelayhub.io/api/telegram/post-event-debrief \
            -H "Content-Type: application/json" \
            -H "x-provision-secret: $PROVISION_WEBHOOK_SECRET"
